name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    name: test (${{ matrix.os }}, bun ${{ matrix.bun }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        # Cover both platforms skillshelf's symlink/realpath plumbing runs on,
        # and pin the declared engines floor (1.0.0) alongside latest.
        os: [ubuntu-latest, macos-latest]
        bun: ["1.0.0", "latest"]
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ matrix.bun }}

      - name: Install dependencies
        run: bun install

      - name: Run tests
        run: bun test
        env:
          SKILLSHELF_LIBRARY: fixtures/library
